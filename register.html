<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="conta.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مستخدم جديد - صنايعى دوت كوم</title>
    <style>
        /* تنسيقات عامة */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* تصميم الفورم */
        .register-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: right;
        }

        .register-container h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .register-container input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .register-container button {
            width: 100%;
            padding: 10px;
            background-color: #5555bb;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .register-container button:hover {
            background-color: #4444aa;
        }

        .register-container p {
            margin-top: 15px;
            text-align: center;
        }

        .register-container a {
            color: #5555bb;
            text-decoration: none;
        }

        .register-container a:hover {
            text-decoration: underline;
        }

        /* تصميم متجاوب */
        @media (max-width: 480px) {
            .register-container {
                padding: 15px;
            }

            .register-container h2 {
                font-size: 20px;
            }

            .register-container input {
                padding: 8px;
            }

            .register-container button {
                padding: 8px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>تسجيل مستخدم جديد</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">تسجيل</button>
        </form>
        <p>لديك حساب بالفعل؟ <a href="login.html">سجل الدخول هنا</a></p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // هنا يمكنك إضافة إرسال البيانات إلى الخادم
            alert('تم تسجيل الحساب بنجاح!');
            window.location.href = "login.html"; // توجيه المستخدم إلى صفحة تسجيل الدخول
        });
    </script>
</body>
</html>
